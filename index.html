<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a1c30">
<title>Acá falta un gobernador — Mapa de reclamos de Mendoza</title>

<!-- ============================================================
     MAPA COLABORATIVO DE RECLAMOS — versión MOBILE-FIRST
     Backend: Google Sheets + Apps Script + Google Drive (fotos)
     Tu URL de API ya está incorporada en WEB_APP_URL (más abajo).
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<style>
  :root{
    --navy-900:#06121f; --navy-800:#0a1c30; --navy-700:#0f2742; --navy-600:#163455;
    --navy-line:#23456b; --azul:#6fa8ff; --oro:#f2c14e; --oro-soft:#ffd97a;
    --texto:#eaf1fb; --texto-mute:#9db4cf; --ok:#43c59e; --cream:#f9f6f1;
    --shadow:0 14px 40px -12px rgba(0,0,0,.6);
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:'Barlow',system-ui,sans-serif;background:var(--cream);color:var(--texto);overflow:hidden;display:flex;flex-direction:column}

  /* ---------- HEADER (imagen) ---------- */
  .siteheader{flex:0 0 auto;background:var(--cream);padding-top:var(--sat);line-height:0;border-bottom:1px solid #e8e1d3}
  .siteheader img{display:block;width:100%;height:auto;max-height:min(28vh,200px);object-fit:contain;object-position:center}

  /* ---------- MAPA ---------- */
  .mapwrap{flex:1;position:relative;min-height:0}
  #map{position:absolute;inset:0;background:#e9ebee;z-index:1}
  .leaflet-container{background:#e9ebee;font-family:'Barlow',sans-serif}

  /* ---------- CONTADOR (en cabecera del panel) ---------- */
  .counter-box{display:flex;align-items:baseline;gap:9px;min-width:0}
  .counter-box b{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:var(--oro);line-height:1}
  .counter-box span{font-size:12px;color:var(--texto-mute);line-height:1.15;text-transform:uppercase;letter-spacing:.4px}
  /* ---------- FILTROS (fila deslizable) ---------- */
  .filterbar{
    position:absolute;left:0;right:0;z-index:500;top:8px;
    display:flex;gap:8px;overflow-x:auto;padding:4px 12px 8px;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;
  }
  .filterbar::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;
    padding:8px 13px;border-radius:30px;cursor:pointer;font-size:13px;font-weight:600;
    background:rgba(10,28,48,.92);border:1px solid var(--navy-line);color:var(--texto-mute);
    backdrop-filter:blur(4px);transition:all .14s ease;white-space:nowrap;user-select:none;
  }
  .chip .dot{width:10px;height:10px;border-radius:50%}
  .chip.active{color:var(--texto);border-color:var(--azul);background:var(--navy-600)}

  /* ---------- BOTÓN PRINCIPAL ---------- */
  .fab{
    position:absolute;z-index:600;left:16px;right:16px;
    bottom:calc(66px + var(--sab) + 12px);
    border:none;border-radius:15px;padding:16px;
    background:linear-gradient(135deg,var(--azul),#3f7fe0);color:#06121f;
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:19px;
    letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
    box-shadow:0 10px 26px -6px rgba(111,168,255,.6);
    transition:opacity .25s ease, transform .12s ease;
  }
  .fab:active{transform:scale(.98)}
  body.panel-open .fab{opacity:0;pointer-events:none}

  /* ---------- PANEL DE LISTA (bottom sheet en mobile) ---------- */
  .panel{
    position:absolute;left:0;right:0;bottom:0;z-index:700;height:74%;
    background:var(--navy-800);border-top:1px solid var(--navy-line);
    border-radius:20px 20px 0 0;box-shadow:var(--shadow);
    transform:translateY(calc(100% - 60px - var(--sab)));
    transition:transform .32s cubic-bezier(.2,.8,.2,1);
    display:flex;flex-direction:column;
  }
  .panel.open{transform:translateY(0)}
  .panelHead{
    flex:0 0 auto;padding:0 18px;min-height:60px;display:flex;align-items:center;gap:10px;cursor:pointer;
  }
  .grip{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:42px;height:4px;border-radius:4px;background:var(--navy-line)}
  .panelHead h3{margin:0;font-family:'Barlow Condensed',sans-serif;font-size:17px;text-transform:uppercase;letter-spacing:.8px}
  .panelHead .chev{margin-left:auto;color:var(--texto-mute);font-size:13px;transition:transform .3s ease}
  .panel.open .panelHead .chev{transform:rotate(180deg)}
  .list{flex:1;overflow-y:auto;padding:4px 12px calc(16px + var(--sab));-webkit-overflow-scrolling:touch}
  .card{
    background:var(--navy-700);border:1px solid var(--navy-line);border-left-width:4px;
    border-radius:12px;padding:12px 14px;margin:9px 4px;cursor:pointer;display:flex;gap:12px;
  }
  .card .cbody{min-width:0;flex:1}
  .card .tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:5px;margin-bottom:4px}
  .card .tag .dot{width:8px;height:8px;border-radius:50%}
  .card h4{margin:0 0 3px;font-size:16px;font-weight:600;font-family:'Barlow Condensed',sans-serif}
  .card p{margin:0;font-size:13px;color:var(--texto-mute);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{margin-top:7px;font-size:11px;color:#6f88a6}
  .card .thumb{flex:0 0 auto;width:58px;height:58px;border-radius:9px;object-fit:cover;background:var(--navy-600)}

  /* ---------- FORMULARIO (hoja a pantalla completa) ---------- */
  .overlay{position:fixed;inset:0;z-index:1000;background:rgba(4,10,18,.55);display:none}
  .overlay.open{display:block}
  .formSheet{
    position:absolute;left:0;right:0;bottom:0;max-height:96%;
    background:var(--navy-800);border-radius:20px 20px 0 0;display:flex;flex-direction:column;
    box-shadow:var(--shadow);animation:rise .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .fhead{flex:0 0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--navy-line)}
  .fhead h3{margin:0;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
  .fhead .x{background:none;border:none;color:var(--texto-mute);font-size:30px;line-height:1;cursor:pointer;padding:0 4px}
  .fbody{overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--texto-mute);margin-bottom:7px;font-weight:600}
  .field input,.field select,.field textarea{
    width:100%;background:var(--navy-700);border:1px solid var(--navy-line);border-radius:11px;
    padding:13px 13px;color:var(--texto);font-family:inherit;font-size:16px;transition:border-color .14s ease;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--azul)}
  .field textarea{resize:vertical;min-height:80px}

  /* Ubicación: GPS + marcar en mapa */
  .loc-btns{display:flex;gap:9px}
  .loc-btns button{
    flex:1;padding:13px 10px;border-radius:11px;border:1px solid var(--navy-line);
    background:var(--navy-700);color:var(--texto);font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  }
  .loc-btns button.primary{background:var(--azul);color:#06121f;border-color:var(--azul)}
  .loc-state{margin-top:9px;font-size:13px;padding:10px 12px;border-radius:10px;border:1px dashed var(--navy-line);color:var(--texto-mute)}
  .loc-state.set{border-style:solid;border-color:var(--ok);color:var(--texto)}

  /* Foto */
  .photo-box{position:relative}
  .photo-btn{
    width:100%;padding:14px;border-radius:11px;border:1px dashed var(--navy-line);
    background:var(--navy-700);color:var(--texto-mute);font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .photo-prev{display:none;position:relative;margin-top:4px}
  .photo-prev img{width:100%;max-height:200px;object-fit:cover;border-radius:11px;display:block}
  .photo-prev .rm{
    position:absolute;top:8px;right:8px;background:rgba(6,18,31,.85);color:#fff;border:none;
    width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer
  }
  .photo-box.has .photo-btn{display:none}
  .photo-box.has .photo-prev{display:block}
  .privacy{font-size:11.5px;color:#6f88a6;margin-top:8px;line-height:1.35}

  .ffoot{flex:0 0 auto;padding:12px 18px calc(16px + var(--sab));border-top:1px solid var(--navy-line)}
  .btn-send{
    width:100%;background:linear-gradient(135deg,var(--oro),var(--oro-soft));color:#06121f;border:none;border-radius:13px;
    padding:16px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer
  }
  .btn-send:disabled{opacity:.45}

  /* Popups */
  .leaflet-popup-content-wrapper{background:var(--navy-700);color:var(--texto);border-radius:13px;border:1px solid var(--navy-line)}
  .leaflet-popup-tip{background:var(--navy-700)}
  .leaflet-popup-content{margin:0;width:230px!important}
  .pop{padding:0;overflow:hidden;border-radius:12px}
  .pop img{width:100%;height:130px;object-fit:cover;display:block;background:var(--navy-600)}
  .pop .pin-body{padding:11px 13px}
  .pop .ptag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:inline-flex;align-items:center;gap:5px}
  .pop .ptag .dot{width:8px;height:8px;border-radius:50%}
  .pop h4{margin:5px 0 4px;font-family:'Barlow Condensed',sans-serif;font-size:17px}
  .pop p{margin:0;font-size:13px;color:var(--texto-mute);line-height:1.4}
  .pop .pmeta{margin-top:7px;font-size:11px;color:#6f88a6}
  .pin{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 8px rgba(0,0,0,.45);border:2px solid #fff}
  .pin span{transform:rotate(45deg);width:7px;height:7px;background:#fff;border-radius:50%}

  /* Aviso de "tocá el mapa" */
  .map-hint{
    position:absolute;top:54px;left:50%;transform:translateX(-50%);z-index:1500;
    background:var(--oro);color:#06121f;font-weight:700;font-size:14px;padding:10px 18px;border-radius:30px;
    font-family:'Barlow Condensed',sans-serif;letter-spacing:.4px;box-shadow:var(--shadow);display:none;
  }
  .toast{
    position:fixed;left:50%;bottom:calc(80px + var(--sab));transform:translateX(-50%) translateY(140px);
    background:var(--ok);color:#06121f;font-weight:600;font-size:14px;padding:13px 20px;border-radius:12px;
    z-index:2000;box-shadow:var(--shadow);max-width:88%;text-align:center;transition:transform .35s cubic-bezier(.2,.8,.2,1)
  }
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.warn{background:var(--oro)}

  /* ---------- ESCRITORIO ---------- */
  @media(min-width:880px){
    #map{left:380px}
    .filterbar{left:392px;top:12px}
    .panel{left:0;top:0;bottom:0;width:380px;height:100%;transform:none;border-radius:0;border-top:none;border-right:1px solid var(--navy-line)}
    .panel .grip{display:none}
    .panelHead{cursor:default;min-height:auto;padding:18px 18px 10px}
    .panelHead .chev{display:none}
    .fab{left:auto;right:24px;bottom:24px;width:auto;padding:15px 24px}
    body.panel-open .fab{opacity:1;pointer-events:auto}
    .overlay{background:rgba(4,10,18,.6)}
    .formSheet{left:50%;top:50%;bottom:auto;transform:translate(-50%,-50%);width:460px;max-height:90vh;border-radius:18px}
    @keyframes rise{from{transform:translate(-50%,-46%);opacity:.4}to{transform:translate(-50%,-50%);opacity:1}}
    .toast{bottom:24px}
    .siteheader img{max-height:188px}
  }
</style>
</head>

<div class="overlay" id="overlay">
  <div class="formSheet">
    <div class="fhead">
      <h3>Sumá tu reclamo</h3>
      <button class="x" id="closeForm" aria-label="Cerrar">&times;</button>
    </div>
    <div class="fbody">
      <div class="field">
        <label>¿Dónde es?</label>
        <div class="loc-btns">
          <button type="button" class="primary" id="gpsBtn">📍 Usar mi ubicación</button>
          <button type="button" id="pickBtn">🗺️ Marcar en el mapa</button>
        </div>
        <div class="loc-state" id="locState">Todavía sin ubicar</div>
      </div>
      <div class="field">
        <label>Tipo de problema</label>
        <select id="fCat"></select>
      </div>
      <div class="field">
        <label>Título corto</label>
        <input id="fTitle" maxlength="70" placeholder="Ej: Hospital sin especialistas">
      </div>
      <div class="field">
        <label>¿Qué pasa?</label>
        <textarea id="fDesc" maxlength="400" placeholder="Contá el problema y desde cuándo…"></textarea>
      </div>
      <div class="field">
        <label>Foto (opcional)</label>
        <div class="photo-box" id="photoBox">
          <button type="button" class="photo-btn" id="photoBtn">📷 Sacar o elegir una foto</button>
          <div class="photo-prev">
            <img id="photoPreview" alt="Vista previa">
            <button type="button" class="rm" id="photoRemove" aria-label="Quitar foto">&times;</button>
          </div>
          <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
        </div>
        <div class="privacy">La foto y el reclamo serán públicos una vez aprobados. No subas datos personales de terceros (caras, patentes, documentos).</div>
      </div>
      <div class="field">
        <label>Localidad / departamento</label>
        <input id="fBarrio" maxlength="60" placeholder="Ej: San Rafael, Tunuyán, Las Heras…">
      </div>
      <div class="field">
        <label>Tu nombre (opcional)</label>
        <input id="fName" maxlength="50" placeholder="Vecino/a anónimo/a">
      </div>
    </div>
    <div class="ffoot">
      <button class="btn-send" id="sendBtn" disabled>Publicar reclamo</button>
    </div>
  </div>
</div>

<script>
/* ===== CATEGORÍAS (competencias provinciales) ===== */

  educacion:  {label:'Educación',                      color:'#ee9b00'},

  transporte: {label:'Transporte',                     color:'#d4569a'},
  economia:   {label:'Empleo y economía',              color:'#588157'},

/* ===== BACKEND: Google Sheets + Apps Script + Drive (fotos) ===== */
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyoaBWWm7H1sq4c0ebKnN4KkMfOZoEarF3Ke53mFHL-KtDIaWe78gZdTUKp_I5ygdAY/exec';

const SEEDS = [
  {id:1, cat:'salud',      lat:-32.889, lng:-68.857, title:'Guardia del hospital saturada', desc:'Esperás horas para que te atiendan y faltan médicos en la guardia.', barrio:'Capital', name:'Paciente de la zona', date:'hace 2 días', foto:''},
  {id:2, cat:'educacion',  lat:-32.900, lng:-68.840, title:'Escuela sin calefacción', desc:'Los chicos cursan con frío, hace meses que esperan que arreglen las estufas.', barrio:'Capital', name:'Madre de la escuela', date:'hace 3 días', foto:''},
  {id:3, cat:'seguridad',  lat:-32.905, lng:-68.800, title:'Casi no hay patrullaje', desc:'Aumentaron los robos en la zona y los móviles no pasan.', barrio:'Guaymallén', name:'', date:'hace 4 días', foto:''},
  {id:4, cat:'obra',       lat:-32.955, lng:-68.865, title:'Ruta provincial llena de pozos', desc:'El asfalto está destrozado y nadie lo repara hace años.', barrio:'Godoy Cruz', name:'', date:'hace 5 días', foto:''},
  {id:5, cat:'agua',       lat:-33.035, lng:-68.882, title:'Cortes de agua y de riego', desc:'Nos quedamos sin agua varios días y el riego no llega a las fincas.', barrio:'Luján de Cuyo', name:'Productor de la zona', date:'hace 1 semana', foto:''},

  {id:7, cat:'salud',      lat:-34.617, lng:-68.330, title:'Hospital sin especialistas', desc:'Para ver a un especialista hay que viajar a la capital, no hay turnos acá.', barrio:'San Rafael', name:'', date:'hace 1 semana', foto:''},
  {id:8, cat:'agua',       lat:-33.576, lng:-69.020, title:'Falta de agua para riego', desc:'La temporada se complica sin agua y peligran las cosechas.', barrio:'Tunuyán, Valle de Uco', name:'Productor frutícola', date:'hace 2 semanas', foto:''},
  {id:9, cat:'obra',       lat:-35.475, lng:-69.584, title:'Ruta cortada por el temporal', desc:'Hace semanas que un tramo está intransitable y nadie viene a repararlo.', barrio:'Malargüe', name:'', date:'hace 2 semanas', foto:''},
];

let reclamos = [];
const isLive = () => WEB_APP_URL && WEB_APP_URL.indexOf('PEGÁ') === -1;

function relTime(iso){
  if(!iso) return '';
  const diff=(Date.now()-new Date(iso).getTime())/1000;
  if(diff<90) return 'recién';
  if(diff<3600) return `hace ${Math.round(diff/60)} min`;
  if(diff<86400) return `hace ${Math.round(diff/3600)} h`;
  if(diff<604800) return `hace ${Math.round(diff/86400)} días`;
  return `hace ${Math.round(diff/604800)} sem`;
}

async function loadReclamos(){
  if(!isLive()) return SEEDS;
  try{
    const res=await fetch(WEB_APP_URL);
    const data=await res.json();
    return data.map(r=>({...r, lat:Number(r.lat), lng:Number(r.lng), date:relTime(r.created_at)}));
  }catch(err){ console.error('No se pudo leer la planilla:',err); return []; }
}

async function saveReclamo(r){   // r puede incluir r.photo (dataURL) para el POST
  if(isLive()){
    try{
      await fetch(WEB_APP_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(r)});
    }catch(err){ console.error('No se pudo guardar:',err); }
  }
  r.id=Date.now();
  r.date=isLive()?'en revisión':'recién';
  r.foto=r.photo||'';   // mostrado optimista local
  delete r.photo;
  reclamos.unshift(r);
  return r;
}

/* ===== MAPA ===== */
const map=L.map('map',{zoomControl:false});
map.fitBounds([[-37.6,-70.6],[-32.0,-66.3]],{padding:[20,20]});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19}).addTo(map);

let markers=[];
const makeIcon=color=>L.divIcon({className:'',html:`<div class="pin" style="background:${color}"><span></span></div>`,iconSize:[26,26],iconAnchor:[13,24],popupAnchor:[0,-22]});
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let activeFilters=new Set(Object.keys(CATS));

function render(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  const visible=reclamos.filter(r=>activeFilters.has(r.cat));
  visible.forEach(r=>{
    const c=CATS[r.cat]?.color||'#7d8597';
    const m=L.marker([r.lat,r.lng],{icon:makeIcon(c)}).addTo(map);
    m.bindPopup(`<div class="pop">
      ${r.foto?`<img src="${r.foto}" alt="" onerror="this.style.display='none'">`:''}
      <div class="pin-body">
        <span class="ptag" style="color:${c}"><span class="dot" style="background:${c}"></span>${CATS[r.cat]?.label||'Otro'}</span>
        <h4>${esc(r.title)}</h4><p>${esc(r.desc)}</p>
        <div class="pmeta">📍 ${esc(r.barrio||'Sin localidad')} · ${esc(r.name||'Anónimo')} · ${r.date||''}</div>
      </div></div>`);
    m._rid=r.id; markers.push(m);
  });
  document.getElementById('counter').textContent=reclamos.length;

  const list=document.getElementById('list');
  list.innerHTML=visible.length?'':'<p style="color:#6f88a6;padding:16px;font-size:13px">No hay reclamos con este filtro.</p>';
  visible.forEach(r=>{
    const c=CATS[r.cat]?.color||'#7d8597';
    const div=document.createElement('div');
    div.className='card'; div.style.borderLeftColor=c;
    div.innerHTML=`${r.foto?`<img class="thumb" src="${r.foto}" alt="" onerror="this.remove()">`:''}
      <div class="cbody">
        <div class="tag" style="color:${c}"><span class="dot" style="background:${c}"></span>${CATS[r.cat]?.label||'Otro'}</div>
        <h4>${esc(r.title)}</h4><p>${esc(r.desc)}</p>
        <div class="meta">📍 ${esc(r.barrio||'Sin localidad')} · ${r.date||''}</div>
      </div>`;
    div.onclick=()=>{ closePanel(); map.flyTo([r.lat,r.lng],15); const mk=markers.find(m=>m._rid===r.id); if(mk) setTimeout(()=>mk.openPopup(),300); };
    list.appendChild(div);
  });
}

/* ===== FILTROS ===== */
const chips=document.getElementById('chips');
Object.entries(CATS).forEach(([k,v])=>{
  const c=document.createElement('div');
  c.className='chip active';
  c.innerHTML=`<span class="dot" style="background:${v.color}"></span>${v.label}`;
  c.onclick=()=>{ if(activeFilters.has(k)){activeFilters.delete(k);c.classList.remove('active')}else{activeFilters.add(k);c.classList.add('active')} render(); };
  chips.appendChild(c);
});

/* ===== SELECT DEL FORM ===== */
const fCat=document.getElementById('fCat');
Object.entries(CATS).forEach(([k,v])=>{const o=document.createElement('option');o.value=k;o.textContent=v.label;fCat.appendChild(o);});

/* ===== PANEL LISTA ===== */
const panel=document.getElementById('panel');
function openPanel(){panel.classList.add('open');document.body.classList.add('panel-open');}
function closePanel(){panel.classList.remove('open');document.body.classList.remove('panel-open');}
document.getElementById('panelHead').onclick=()=>panel.classList.contains('open')?closePanel():openPanel();

/* ===== FORMULARIO ===== */
const overlay=document.getElementById('overlay');
const mapHint=document.getElementById('mapHint');
let picking=false, picked=null, photoData=null;

document.getElementById('openForm').onclick=()=>overlay.classList.add('open');
document.getElementById('closeForm').onclick=()=>overlay.classList.remove('open');

/* Ubicación por GPS */
document.getElementById('gpsBtn').onclick=function(){
  if(!navigator.geolocation){ showToast('Tu dispositivo no permite geolocalización.','warn'); return; }
  const old=this.textContent; this.textContent='Ubicando…'; this.disabled=true;
  navigator.geolocation.getCurrentPosition(pos=>{
    picked={lat:pos.coords.latitude,lng:pos.coords.longitude};
    setLoc(); this.textContent=old; this.disabled=false; validate();
  },()=>{
    this.textContent=old; this.disabled=false;
    showToast('No pudimos acceder al GPS. Probá "Marcar en el mapa".','warn');
  },{enableHighAccuracy:true,timeout:10000});
};

/* Ubicación por toque en el mapa */
document.getElementById('pickBtn').onclick=()=>{
  overlay.classList.remove('open'); picking=true; mapHint.style.display='block';
};
map.on('click',e=>{
  if(!picking) return;
  picked={lat:e.latlng.lat,lng:e.latlng.lng};
  picking=false; mapHint.style.display='none';
  setLoc(); overlay.classList.add('open'); validate();
});
function setLoc(){
  const el=document.getElementById('locState');
  el.classList.add('set');
  el.textContent=`✓ Ubicación lista (${picked.lat.toFixed(4)}, ${picked.lng.toFixed(4)})`;
}

/* Foto: cámara/galería + compresión */
const photoBox=document.getElementById('photoBox');
const photoInput=document.getElementById('photoInput');
document.getElementById('photoBtn').onclick=()=>photoInput.click();
document.getElementById('photoRemove').onclick=()=>{photoData=null;photoInput.value='';photoBox.classList.remove('has');};
photoInput.onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=1280; let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      photoData=cv.toDataURL('image/jpeg',0.7);
      document.getElementById('photoPreview').src=photoData;
      photoBox.classList.add('has');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
};

/* Validación + envío */
const sendBtn=document.getElementById('sendBtn');
['fCat','fTitle','fDesc'].forEach(id=>document.getElementById(id).addEventListener('input',validate));
function validate(){
  sendBtn.disabled=!(picked && document.getElementById('fTitle').value.trim() && document.getElementById('fDesc').value.trim());
}
sendBtn.onclick=async()=>{
  const r={
    cat:fCat.value, lat:picked.lat, lng:picked.lng,
    title:document.getElementById('fTitle').value.trim(),
    desc:document.getElementById('fDesc').value.trim(),
    barrio:document.getElementById('fBarrio').value.trim(),
    name:document.getElementById('fName').value.trim(),
    photo:photoData||''
  };
  sendBtn.disabled=true; sendBtn.textContent='Publicando…';
  await saveReclamo(r);
  // reset
  ['fTitle','fDesc','fBarrio','fName'].forEach(id=>document.getElementById(id).value='');
  picked=null; photoData=null; photoInput.value=''; photoBox.classList.remove('has');
  document.getElementById('locState').classList.remove('set');
  document.getElementById('locState').textContent='Todavía sin ubicar';
  sendBtn.textContent='Publicar reclamo';
  overlay.classList.remove('open');
  render();
  map.flyTo([r.lat,r.lng],15);
  showToast(isLive()?'¡Gracias! Tu reclamo fue enviado y aparecerá una vez revisado.':'¡Reclamo publicado en el mapa!');
};

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.className='toast'+(type==='warn'?' warn':'');
  t.textContent=msg; requestAnimationFrame(()=>t.classList.add('show'));
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),4500);
}

/* ===== INIT ===== */
(async function(){ reclamos=await loadReclamos(); render(); })();
</script>
</body>
</html>
